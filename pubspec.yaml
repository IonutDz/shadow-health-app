name: shadow_health
description: ShadowHealth - Tu compañero modular de fitness

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.3.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0

  # QR code (for download page)
  qr_flutter: ^4.1.0

  # URL launcher (for download APK link)
  url_launcher: ^6.3.0

  # Google Sign In
  google_sign_in: ^6.2.1

  # Utils
  intl: ^0.19.0
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
